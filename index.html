<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Ocupación — Juan Carlos Gutierrez</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --surface-2: #181818;
    --border: rgba(255,255,255,0.07);
    --border-mid: rgba(255,255,255,0.12);
    --text-primary: #F0F0ED;
    --text-secondary: #E0E0DC;
    --text-muted: #B0B0AC;
    --accent: #C8F060;
    --op: #60A8F0;
    --op-dim: rgba(96,168,240,0.1);
    --ps: #C060F0;
    --ps-dim: rgba(192,96,240,0.1);
    --co: #F09060;
    --co-dim: rgba(240,144,96,0.1);
    --radius: 14px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 3rem 1.5rem 5rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 860px; margin: 0 auto; }

  /* ── WEEK SELECTOR ── */
  .week-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 2.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px;
  }
  .week-btn {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
    background: transparent;
    color: var(--text-muted);
  }
  .week-btn:hover { color: var(--text-primary); background: var(--surface-2); }
  .week-btn.active { background: var(--accent); color: #0A0A0A; }

  /* ── HEADER ── */
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 1.5rem;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }
  .header-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .header-name {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

    flex-direction: column;
    align-items: flex-end;
